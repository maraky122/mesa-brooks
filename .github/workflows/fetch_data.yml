name: Fetch Market Data

on:
  schedule:
    # Janelas escolhidas pelas movimentações (UTC, horário de verão NY):
    - cron: "15 7 * * 1-5"   # pós-abertura de Londres (metais/petróleo/cripto)
    - cron: "45 12 * * 1-5"  # após indicadores 12:30, antes da NYSE
    - cron: "0 15 * * 1-5"   # opening range definido; 1º pullback (janela Brooks)
    - cron: "0 18 * * 1-5"   # tendência da tarde + FOMC
    - cron: "30 21 * * 1-5"  # fechamento, D1 fechado, journal
    - cron: "0 13 * * 0,6"   # cobertura de cripto no fim de semana
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas yfinance requests pyyaml

      - name: Run fetch
        # exit code 1 indica falhas parciais — ainda assim commitamos o que veio;
        # o fetch_summary.txt registra as falhas para o agente declarar na sessão
        run: python scripts/fetch_data.py || echo "::warning::fetch com falhas parciais (ver fetch_summary.txt)"

      - name: Commit & push CSVs
        run: |
          git config user.name  "mesa-brooks-bot"
          git config user.email "bot@mesa-brooks"
          git add data/ohlc/ data/fetch_summary.txt
          git diff --cached --quiet && echo "Sem dados novos." || \
            git commit -m "data: atualização automática de dados OHLC $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
