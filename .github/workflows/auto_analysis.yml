name: Auto Analysis

on:
  schedule:
    # Roda 15 min após cada janela de fetch (UTC, dias úteis)
    - cron: "30 7 * * 1-5"    # 07:30 — pós-abertura de Londres
    - cron: "0 13 * * 1-5"    # 13:00 — após indicadores das 12:30
    - cron: "15 15 * * 1-5"   # 15:15 — após opening range NYSE
    - cron: "15 18 * * 1-5"   # 18:15 — após fechamento NYSE + FOMC
    - cron: "45 21 * * 1-5"   # 21:45 — após fechamento D1
  workflow_dispatch:            # permite rodar manualmente pelo GitHub

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic pandas pyyaml

      - name: Run auto analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/auto_analysis.py
