name: Publish Report

on:
  push:
    branches: [main]
    paths:
      - "reports/**"
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site/reports
          cp site/index.html _site/
          cp reports/*.md _site/reports/ 2>/dev/null || true
          # gera reports.json: lista ordenada (mais novo primeiro) com preview e nº de sinais
          python3 - <<'EOF'
          import json, re
          from pathlib import Path
          items = []
          for f in sorted(Path("reports").glob("*.md"), reverse=True):
              if f.name.startswith("weekly-review"):
                  continue
              text = f.read_text(encoding="utf-8")
              sinais = len(re.findall(r"^## SINAL", text, re.M))
              ctx = re.search(r"\*\*Contexto ES=F:\*\* (.+)", text)
              preview = (ctx.group(1)[:90] + "…") if ctx else ""
              items.append({"file": f.name, "sinais": sinais, "preview": preview})
          Path("_site/reports.json").write_text(json.dumps(items, ensure_ascii=False))
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate latest report prices
        run: |
          latest=$(ls -1 reports/*.md 2>/dev/null | grep -v weekly-review | sort | tail -1)
          if [ -z "$latest" ]; then
            echo "Nenhum relatório encontrado — pulando validação."
            exit 0
          fi
          echo "Validando: $latest"
          python3 scripts/validate_report.py "$latest"

